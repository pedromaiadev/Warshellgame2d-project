<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warshell Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      #app {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
        max-width: 1400px;
      }

      .header {
        text-align: center;
        color: white;
      }

      .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .header p {
        font-size: 1.1em;
        opacity: 0.9;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      input {
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 1em;
      }

      button {
        padding: 10px 20px;
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1em;
        font-weight: bold;
        transition: background 0.3s;
      }

      button:hover {
        background: #ff5252;
      }

      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      #canvas {
        display: block;
        background: linear-gradient(to bottom, #87ceeb 0%, #e0f6ff 100%);
        border: 2px solid #333;
        border-radius: 8px;
        cursor: crosshair;
        max-width: 100%;
        height: auto;
      }

      .info {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 8px;
        color: white;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .info-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .info-label {
        font-size: 0.9em;
        opacity: 0.8;
      }

      .info-value {
        font-size: 1.3em;
        font-weight: bold;
      }

      .status {
        padding: 10px;
        border-radius: 4px;
        text-align: center;
        font-weight: bold;
      }

      .status.connected {
        background: #51cf66;
        color: white;
      }

      .status.disconnected {
        background: #ff8787;
        color: white;
      }

      .players-list {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 8px;
        color: white;
        max-height: 200px;
        overflow-y: auto;
      }

      .players-list h3 {
        margin-bottom: 10px;
        font-size: 1.1em;
      }

      .player-item {
        padding: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
      }

      .player-health {
        width: 100px;
        height: 10px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
      }

      .player-health-bar {
        height: 100%;
        background: #51cf66;
        transition: width 0.2s;
      }

      .error {
        background: #ff8787;
        color: white;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 20px;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 1.8em;
        }

        .controls {
          flex-direction: column;
        }

        input,
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="header">
        <h1>🎮 Warshell Game</h1>
        <p>Multiplayer Artillery Combat</p>
      </div>

      <div id="errorContainer"></div>

      <div class="controls">
        <input
          type="text"
          id="usernameInput"
          placeholder="Enter your username"
          maxlength="20"
        />
        <input type="text" id="roomInput" placeholder="Room ID" value="lobby" />
        <button id="joinBtn">Join Game</button>
        <button id="leaveBtn" disabled>Leave Game</button>
      </div>

      <div id="statusContainer" class="status disconnected">
        Disconnected
      </div>

      <canvas id="canvas" width="1200" height="600"></canvas>

      <div class="info">
        <div class="info-item">
          <span class="info-label">Player ID</span>
          <span class="info-value" id="playerId">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Health</span>
          <span class="info-value" id="health">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Score</span>
          <span class="info-value" id="score">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Angle / Power</span>
          <span class="info-value" id="anglepower">—</span>
        </div>
      </div>

      <div class="players-list">
        <h3>Players in Room</h3>
        <div id="playersList"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
